<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成 TaskFlow PWA 图标</title>
  <style>
    body { font-family: system-ui; max-width: 500px; margin: 50px auto; text-align: center; background: #f8fafc; }
    button { padding: 16px 40px; font-size: 18px; background: #4f46e5; color: white; border: none; border-radius: 12px; cursor: pointer; margin: 10px; }
    button:hover { background: #4338ca; }
    .preview { display: flex; justify-content: center; gap: 40px; margin: 30px 0; }
    .preview div { text-align: center; }
    canvas { border: 2px dashed #d1d5db; border-radius: 16px; }
    .done { color: #10b981; font-weight: bold; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <h2>🔧 TaskFlow PWA 图标生成器</h2>
  <p>点击按钮一键生成 192px 和 512px 的 PNG 图标</p>
  <div class="preview">
    <div><canvas id="c192" width="192" height="192"></canvas><p>192×192</p></div>
    <div><canvas id="c512" width="512" height="512"></canvas><p>512×512</p></div>
  </div>
  <button onclick="generateAll()">⬇ 一键生成并下载</button>
  <p class="done" id="done">✅ 图标生成完成！请将下载的文件放入 public/ 目录</p>

  <script>
    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6366f1"/>
          <stop offset="100%" style="stop-color:#4f46e5"/>
        </linearGradient>
        <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#34d399"/>
          <stop offset="100%" style="stop-color:#10b981"/>
        </linearGradient>
      </defs>
      <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
      <rect x="120" y="100" width="272" height="320" rx="28" ry="28" fill="white" opacity="0.95"/>
      <rect x="180" y="72" width="152" height="56" rx="20" ry="20" fill="white" opacity="0.95"/>
      <rect x="200" y="88" width="112" height="8" rx="4" fill="#d1d5db"/>
      <rect x="160" y="180" width="192" height="10" rx="5" fill="#e5e7eb"/>
      <rect x="160" y="220" width="150" height="10" rx="5" fill="#e5e7eb"/>
      <rect x="160" y="260" width="170" height="10" rx="5" fill="#e5e7eb"/>
      <circle cx="368" cy="260" r="48" fill="url(#check)"/>
      <polyline points="345,260 360,278 392,243" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="148" cy="182" r="6" fill="#6366f1"/>
      <circle cx="148" cy="222" r="6" fill="#6366f1"/>
      <circle cx="148" cy="262" r="6" fill="#6366f1"/>
    </svg>`;

    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
      };
      img.src = 'data:image/svg+xml,' + encodeURIComponent(svgContent.replace(/\n\s*/g, ' '));
    }

    function downloadCanvas(canvas, filename) {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    function generateAll() {
      downloadCanvas(document.getElementById('c192'), 'icon-192.png');
      setTimeout(() => downloadCanvas(document.getElementById('c512'), 'icon-512.png'), 200);
      document.getElementById('done').style.display = 'block';
    }

    // 预览绘制
    drawIcon(document.getElementById('c192'), 192);
    drawIcon(document.getElementById('c512'), 512);
  </script>
</body>
</html>
