<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>快速添加 · TaskFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --danger: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .header .badge {
      font-size: 11px;
      background: var(--primary-light);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #f1f5f9;
      transition: all 0.15s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      background: #f1f5f9;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tag-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .tag-btn:not(.active):hover { background: #e2e8f0; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-primary { background: var(--primary); color: white; flex: 1; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary { background: #e2e8f0; color: var(--text); }
    .btn-secondary:hover { background: #cbd5e1; }

    .quick-templates {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .tpl-btn {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      background: #f1f5f9;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tpl-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    .today-summary {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card: #1e293b; --text: #e2e8f0;
        --text-light: #94a3b8; --border: #334155;
      }
      input, select, .tag-btn { background: #1e293b; color: #e2e8f0; }
      .tag-btn.active { background: var(--primary); }
      .btn-secondary { background: #334155; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>⚡ 快速添加<small class="badge">Ctrl+N</small></h2>
    <button onclick="openFullApp()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-light);">🔗</button>
  </div>

  <div id="templatesCard" class="card" style="display:none;">
    <label class="form-group" style="margin-bottom:8px;"><strong style="font-size:13px;">💡 快捷模板（一点即添加）</strong></label>
    <div class="quick-templates" id="templates"></div>
  </div>

  <div class="card">
    <div class="form-group">
      <label>📝 任务名称</label>
      <input type="text" id="taskName" placeholder="例如：完成六级阅读练习" autofocus />
    </div>
    <div class="form-group">
      <label>🏷️ 标签</label>
      <div class="tag-row" id="tags"></div>
    </div>
    <div class="form-group">
      <label>⏱️ 预计耗时</label>
      <select id="estimatedMinutes">
        <option value="15">15 分钟</option>
        <option value="30" selected>30 分钟</option>
        <option value="45">45 分钟</option>
        <option value="60">1 小时</option>
        <option value="90">1.5 小时</option>
        <option value="120">2 小时</option>
      </select>
    </div>
    <div class="form-group">
      <label>📂 类别</label>
      <div style="display:flex;gap:8px;">
        <button class="tag-btn" data-cat="A" onclick="selectCat('A',this)">A 核心</button>
        <button class="tag-btn active" data-cat="B" onclick="selectCat('B',this)">B 弹性</button>
        <button class="tag-btn" data-cat="C" onclick="selectCat('C',this)">C 可选</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addTask()">✓ 添加任务</button>
    </div>
  </div>

  <div id="todayCard" class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h3 style="font-size:15px;">📋 今日任务</h3>
      <button onclick="loadToday()" style="background:none;border:none;font-size:14px;cursor:pointer;color:var(--primary);">🔄</button>
    </div>
    <div class="today-summary" id="summary"></div>
    <div id="taskList" style="margin-top:12px;font-size:13px;color:var(--text-light);">加载中...</div>
  </div>

  <div class="toast" id="toast">✓ 任务已添加</div>

  <script>
    // ====== Config ======
    const API_BASE = (() => {
      const host = window.location.hostname;
      if (host === 'localhost' || host === '127.0.0.1') return '/api';
      // Try to detect from URL, or use same origin
      return '/api';
    })();

    const TAGS = {
      english: { icon: '🇬🇧', name: '英语六级', color: 'bg-blue-100 text-blue-700' },
      course: { icon: '📚', name: '课程作业', color: 'bg-green-100 text-green-700' },
      contest: { icon: '🏆', name: '竞赛', color: 'bg-yellow-100 text-yellow-700' },
      project: { icon: '💻', name: '项目/科研', color: 'bg-purple-100 text-purple-700' },
      life: { icon: '🏠', name: '生活', color: 'bg-gray-100 text-gray-700' },
    };

    let selectedTag = 'life';
    let selectedCategory = 'B';
    let templates = [];

    // ====== Init ======
    function init() {
      // Render tags
      const tagRow = document.getElementById('tags');
      Object.entries(TAGS).forEach(([key, t]) => {
        const btn = document.createElement('button');
        btn.className = `tag-btn ${key === selectedTag ? 'active' : ''}`;
        btn.innerHTML = `${t.icon} ${t.name}`;
        btn.onclick = () => selectTag(key);
        tagRow.appendChild(btn);
      });

      loadTemplates();
      loadToday();

      // Keyboard shortcut
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
          e.preventDefault();
          addTask();
        }
      });

      // Auto-focus
      document.getElementById('taskName').focus();
    }

    function selectTag(tag) {
      selectedTag = tag;
      document.querySelectorAll('#tags .tag-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('#tags .tag-btn').forEach(b => {
        if (b.textContent.includes(TAGS[tag].name)) b.classList.add('active');
      });
    }

    function selectCat(cat, el) {
      selectedCategory = cat;
      document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    // ====== API ======
    async function loadTemplates() {
      try {
        const res = await fetch(`${API_BASE}/templates`);
        const data = await res.json();
        if (data.code === 0 && data.data?.length > 0) {
          templates = data.data;
          const tplDiv = document.getElementById('templates');
          templates.slice(0, 8).forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'tpl-btn';
            btn.innerHTML = `${TAGS[t.tag]?.icon || '📌'} ${t.name}`;
            btn.title = `点击快速添加: ${t.name}`;
            btn.onclick = () => applyTemplate(t.id);
            tplDiv.appendChild(btn);
          });
          document.getElementById('templatesCard').style.display = 'block';
        }
      } catch (err) { /* silent */ }
    }

    async function loadToday() {
      try {
        const res = await fetch(`${API_BASE}/tasks/today?include_completed=false`);
        const data = await res.json();
        if (data.code === 0) {
          const tasks = data.data.tasks || [];
          const pending = tasks.filter(t => !t._is_completed && t.status !== 'done');
          const done = tasks.filter(t => t._is_completed || t.status === 'done');
          
          document.getElementById('summary').innerHTML = `
            <div class="stat-item"><div class="stat-value">${pending.length}</div><div class="stat-label">待完成</div></div>
            <div class="stat-item"><div class="stat-value">${done.length}</div><div class="stat-label">已完成</div></div>
            <div class="stat-item"><div class="stat-value">${pending.length + done.length}</div><div class="stat-label">全部</div></div>
          `;

          if (pending.length === 0 && done.length === 0) {
            document.getElementById('taskList').innerHTML = '<p style="text-align:center;padding:12px;">✨ 今天还没有任务，来添加一个吧！</p>';
          } else if (pending.length === 0 && done.length > 0) {
            document.getElementById('taskList').innerHTML = '<p style="text-align:center;padding:12px;color:#22c55e;font-weight:500;">🎉 今日任务全部完成！</p>';
          } else {
            document.getElementById('taskList').innerHTML = pending.slice(0, 8).map(t => `
              <div style="display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:4px;background:#f1f5f9;border-radius:8px;font-size:13px;">
                <span>${TAGS[t.tag]?.icon || '📌'}</span>
                <span style="flex:1;color:var(--text);">${t.name}</span>
                <span style="font-size:11px;color:var(--text-light);">${t.estimated_minutes || 30}min</span>
              </div>
            `).join('');
          }
        }
      } catch (err) {
        document.getElementById('taskList').innerHTML = '⚠️ 无法加载任务';
      }
    }

    async function addTask() {
      const name = document.getElementById('taskName').value.trim();
      if (!name) {
        document.getElementById('taskName').focus();
        return;
      }

      const taskData = {
        name,
        tag: selectedTag,
        category: selectedCategory,
        estimated_minutes: parseInt(document.getElementById('estimatedMinutes').value),
        repeat_type: 'none',
      };

      try {
        const res = await fetch(`${API_BASE}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(taskData)
        });
        const data = await res.json();
        if (data.code === 0) {
          document.getElementById('taskName').value = '';
          document.getElementById('taskName').focus();
          showToast('✓ 任务已添加');
          loadToday();
          // Notify parent window if opened as popup
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: 'taskflow:task-added' }, '*');
          }
        } else {
          showToast('⚠️ ' + (data.msg || '添加失败'));
        }
      } catch (err) {
        showToast('⚠️ 网络错误，请检查后端服务');
      }
    }

    async function applyTemplate(templateId) {
      try {
        const res = await fetch(`${API_BASE}/templates/${templateId}/apply`, { method: 'POST' });
        const data = await res.json();
        if (data.code === 0) {
          showToast('✓ 模板已添加');
          loadToday();
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: 'taskflow:task-added' }, '*');
          }
        }
      } catch (err) {
        showToast('⚠️ 网络错误');
      }
    }

    function openFullApp() {
      if (window.opener && !window.opener.closed) {
        window.opener.focus();
      } else {
        window.open('/', '_blank');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    init();
  </script>
</body>
</html>
